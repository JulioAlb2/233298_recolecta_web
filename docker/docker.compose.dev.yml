name: recolecta-dev-env

services:
  backend:
    build:
      context: ../gin-backend
      dockerfile: Dockerfile.dev
    container_name: gin_backend_dev
    working_dir: /app
    command: ["air", "-c", "/app/.air.toml"]
    volumes:
      - ../gin-backend:/app
      - ../credentials:/credentials:ro
      - go_cache:/go/pkg/mod
    env_file:
      - ../.env
    environment:
      API_PORT: ${BACKEND_PORT:-8080}
      DB_HOST: postgres_db
      GOOGLE_APPLICATION_CREDENTIALS: ${GOOGLE_APPLICATION_CREDENTIALS}
      FCM_CREDENTIALS_FILE: ${FCM_CREDENTIALS_FILE:-/credentials/firebase_credentials.json}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      database:
        condition: service_healthy
    networks:
      app_internal_net:
        aliases:
          - gin_backend

  frontend:
    image: node:20-alpine
    container_name: frontend_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173 --strictPort"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
    expose:
      - "5173"
    networks:
      - app_internal_net

  map-view:
    image: node:20-alpine
    container_name: map_view_dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5174 --strictPort --base /mapa/"
    volumes:
      - ../map-view:/app
      - map_view_node_modules:/app/node_modules
    expose:
      - "5174"
    networks:
      - app_internal_net

  proxy:
    build:
      context: .
      dockerfile: Dockerfile.nginx.dev
    volumes:
      - ./nginx/nginx.dev.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
      - map-view

  ngrok:
    image: ngrok/ngrok:latest
    container_name: ngrok_tunnel
    restart: unless-stopped
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    command: http proxy:80 --log stdout
    ports:
      - "4040:4040"
    depends_on:
      - proxy
    networks:
      - app_internal_net

volumes:
  go_cache:
  frontend_node_modules:
  map_view_node_modules:
